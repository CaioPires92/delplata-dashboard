<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pousada Del Plata - Hospedin Live</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .app-container {
            display: block;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--color-green);
        }
        .status-badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-yellow);
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-green);
        }
        .sync-status .status-dot {
            width: 8px;
            height: 8px;
            background: var(--color-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="dark-theme">
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text">Sincronizando com Hospedin...</div>
    </div>

    <div class="app-container">
        <header class="top-header">
            <div class="logo">
                <i data-lucide="hotel" class="logo-icon" style="color: var(--color-purple);"></i>
                <div class="logo-text">
                    <h1>Del Plata</h1>
                    <span style="color: var(--text-secondary); font-size: 0.85rem;">Hospedin Live API</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="sync-status">
                    <span class="status-dot"></span>
                    Sincronizado ao Vivo
                </div>
            </div>
        </header>

        <div class="tab-content active" id="tab-overview" style="animation: fadeIn 0.5s;">
            <div class="dashboard-grid">
                <div class="card kpi-card kpi-blue">
                    <div class="kpi-header">
                        <span>OCUPAÇÃO ATUAL</span>
                        <i data-lucide="bed-double"></i>
                    </div>
                    <div class="kpi-value" id="kpi-occupancy">0%</div>
                </div>

                <div class="card kpi-card kpi-purple">
                    <div class="kpi-header">
                        <span>TICKET MÉDIO (ADR)</span>
                        <i data-lucide="trending-up"></i>
                    </div>
                    <div class="kpi-value" id="kpi-adr">R$ 0,00</div>
                </div>

                <div class="card kpi-card kpi-green">
                    <div class="kpi-header">
                        <span>RECEITA DO MÊS</span>
                        <i data-lucide="dollar-sign"></i>
                    </div>
                    <div class="kpi-value" id="kpi-revenue">R$ 0,00</div>
                </div>

                <div class="card kpi-card kpi-cyan">
                    <div class="kpi-header">
                        <span>REVPAR</span>
                        <i data-lucide="activity"></i>
                    </div>
                    <div class="kpi-value" id="kpi-revpar">R$ 0,00</div>
                </div>
            </div>

            <div class="main-content" style="display: grid; grid-template-columns: 1fr; margin-top: 2rem;">
                <div class="card table-card">
                    <div class="table-header-actions">
                        <h2 class="section-title" style="margin-bottom: 0;">
                            <i data-lucide="calendar"></i>
                            Próximos Check-ins (Hospedin)
                        </h2>
                    </div>
                    
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Hóspede</th>
                                    <th>Status</th>
                                    <th>Data de Check-in</th>
                                    <th>Canal / Origem</th>
                                </tr>
                            </thead>
                            <tbody id="reservations-tbody">
                                <!-- Injected via app.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
